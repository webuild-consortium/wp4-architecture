# WE BUILD CS-06 CA — public-facing HTTP reverse proxy.
#
# Drop this on your nginx host (e.g. /etc/nginx/sites-available/ca-public.conf),
# replace `ca.example.com` with your real hostname, symlink into sites-enabled,
# `nginx -t && systemctl reload nginx`, then run certbot to upgrade to HTTPS.
#
# After certbot has flipped this to listen on 443, do the post-cert steps
# documented in deployment/README.md ("Exposing the CA externally") so that
# the ACME directory documents advertise your public https:// URLs instead
# of mw-vm-ca01.lab:8443/9080.

server {
    listen      80;
    listen      [::]:80;
    server_name ca.example.com;          # <-- replace

    # ---------- Stock Dogtag ACME (RFC 8555) ----------
    # Backend is HTTPS with Dogtag's self-signed cert, so we disable
    # upstream verification. If you'd rather verify, drop the Dogtag root
    # cert on the nginx host and switch this to:
    #     proxy_ssl_verify on;
    #     proxy_ssl_trusted_certificate /etc/ssl/dogtag-ca-root.pem;
    location /acme/ {
        proxy_pass                         https://mw-vm-ca01.lab:8443;
        proxy_ssl_verify                   off;
        proxy_ssl_server_name              on;
        proxy_http_version                 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # ---------- CS-06 ACME façade ----------
    location /acme-eudi-wrpac/ {
        proxy_pass                         http://mw-vm-ca01.lab:9080;
        proxy_http_version                 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # /tos is linked from the façade's ACME directory metadata.
    location = /tos {
        proxy_pass        http://mw-vm-ca01.lab:9080;
        proxy_set_header  Host $host;
    }

    # ---------- Mock Registrar / RP List ----------
    # The PUT /rp-list/{wrp_id}/acme-challenge endpoint is what an ACME
    # client uses to place its key-authorization, so it must be reachable.
    # All RP List endpoints are currently UNAUTHENTICATED — restrict by IP
    # (e.g. allow only your test-bed network) before exposing publicly.
    location /rp-list {
        # allow  198.51.100.0/24;   # <-- your test-bed CIDR
        # deny   all;
        proxy_pass         http://mw-vm-ca01.lab:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ---------- Optional: Dogtag EE pages + OCSP (HTTP) ----------
    # Useful if external clients ever need to browse the profile-select pages
    # or hit OCSP. Comment out if not needed.
    location ^~ /ca/ee/ {
        proxy_pass        http://mw-vm-ca01.lab:8080;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Forwarded-Proto $scheme;
    }
    location = /ca/ocsp {
        proxy_pass        http://mw-vm-ca01.lab:8080;
        proxy_set_header  Host $host;
    }

    # ---------- Hard block credentialled surfaces ----------
    # These accept admin / agent credentials and MUST NOT be exposed publicly.
    location ~ ^/ca/(admin|services|rest|agent)(/|$) {
        return 403;
    }
}
